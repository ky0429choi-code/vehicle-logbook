<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B64A8">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./assets/icon-192.png">
<link rel="icon" href="./assets/icon-192.png">
<title>차량일지</title>
<!-- mobile-compact-jsonp-v1 -->

<style>
  :root {
    --primary:    #1B64A8;
    --primary-bg: #E3EEF9;
    --accent:     #2A7D3F;
    --accent-bg:  #DFF2E4;
    --warn:       #C0392B;
    --gray:       #5F5E5A;
    --gray-bg:    #F1EFE8;
    --border:     #D3D1C7;
    --bg:         #EFEDE6;
    --surface:    #FFFFFF;
    --text:       #111110;
    --muted:      #555550;
    --radius:     14px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 76px;
    line-height: 1.35;
  }

  .header {
    background: var(--primary);
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-logo {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(255,255,255,0.18);
    object-fit: contain;
  }

  .header-title {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .header-date {
    font-size: 15px;
    font-weight: 700;
    opacity: 0.9;
    white-space: nowrap;
  }

  .vehicle-strip {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    font-size: 16px;
    font-weight: 800;
    color: var(--primary);
  }

  .vehicle-strip span {
    color: var(--muted);
    font-weight: 700;
    margin-left: 4px;
  }

  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 13px 10px;
    text-align: center;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    font-weight: 700;
    transition: all 0.15s;
  }

  .tab.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 800;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .notice {
    margin: 10px 10px 0;
    padding: 10px 12px;
    border-radius: var(--radius);
    background: var(--primary-bg);
    color: var(--primary);
    font-size: 14px;
    font-weight: 700;
  }

  .step-card {
    background: var(--surface);
    margin: 10px 10px 0;
    border-radius: var(--radius);
    padding: 15px 14px;
    border: 1px solid var(--border);
  }

  .step-header {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 14px;
  }

  .step-num {
    background: var(--primary);
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .step-num.green { background: var(--accent); }

  .step-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
  }

  .step-selected {
    margin-left: auto;
    font-size: 14px;
    font-weight: 800;
    color: var(--primary);
    background: var(--primary-bg);
    padding: 5px 10px;
    border-radius: 99px;
    max-width: 38%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .step-selected.green {
    color: var(--accent);
    background: var(--accent-bg);
  }

  .region-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .region-tab {
    padding: 8px 12px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 800;
    border: 1.8px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .region-tab.active {
    background: var(--primary-bg);
    border-color: var(--primary);
    color: var(--primary);
  }

  .loc-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .loc-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 8px;
    min-height: 58px;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loc-btn:active { transform: scale(0.97); }

  .loc-btn.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 2px 10px rgba(27,100,168,0.25);
  }

  .loc-btn.etc {
    border-style: dashed;
    color: var(--muted);
    font-weight: 700;
    font-size: 17px;
  }

  .loc-btn.etc.selected {
    background: var(--primary);
    border-style: solid;
    border-color: var(--primary);
    color: white;
  }

  .purpose-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 8px;
  }

  .purpose-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 12px 4px;
    min-height: 76px;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
  }

  .purpose-btn:active { transform: scale(0.97); }

  .purpose-btn .p-icon { font-size: 28px; line-height: 1; }

  .purpose-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 2px 10px rgba(42,125,63,0.25);
  }

  .keep-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 12px 0 0;
    padding: 12px 14px;
    background: var(--gray-bg);
    border-radius: var(--radius);
    cursor: pointer;
  }

  .keep-row input[type=checkbox] {
    width: 22px;
    height: 22px;
    accent-color: var(--primary);
    flex-shrink: 0;
  }

  .keep-row label {
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    font-weight: 700;
  }

  .memo-input {
    width: 100%;
    margin-top: 10px;
    padding: 13px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 17px;
    font-weight: 700;
    background: var(--surface);
    color: var(--text);
    outline: none;
  }

  .memo-input:focus { border-color: var(--primary); }

  .submit-wrap { padding: 14px 10px; }

  .submit-btn {
    width: 100%;
    padding: 17px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 22px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: 0 3px 12px rgba(27,100,168,0.25);
  }

  .submit-btn:active { transform: scale(0.98); }

  .submit-btn:disabled {
    background: #C5C3BB;
    color: #9A9890;
    cursor: default;
    transform: none;
    box-shadow: none;
  }

  .toast {
    position: fixed;
    bottom: 92px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #1A1A19;
    color: white;
    padding: 12px 18px;
    border-radius: 99px;
    font-size: 15px;
    font-weight: 800;
    opacity: 0;
    transition: all 0.25s;
    white-space: nowrap;
    z-index: 100;
    max-width: 92vw;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .log-list { padding: 10px; }

  .log-empty {
    text-align: center;
    color: var(--muted);
    font-size: 18px;
    padding: 40px 0;
    font-weight: 700;
  }

  .log-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 14px;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .log-route {
    font-size: 19px;
    font-weight: 800;
    word-break: keep-all;
  }

  .log-time {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 700;
  }

  .log-badge {
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 99px;
    background: var(--primary-bg);
    color: var(--primary);
    white-space: nowrap;
    flex-shrink: 0;
    font-weight: 800;
  }

  .log-badge.food {
    background: var(--accent-bg);
    color: var(--accent);
  }

  .log-badge.other {
    background: var(--gray-bg);
    color: var(--gray);
  }

  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 10;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 8px 0 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-weight: 800;
  }

  .nav-item .nav-icon { font-size: 25px; }

  .nav-item.active { color: var(--primary); }

  @media (max-width: 360px) {
    .header-title { font-size: 22px; }
    .header-date { font-size: 14px; }
    .step-title { font-size: 20px; }
    .loc-btn { font-size: 20px; min-height: 54px; }
    .purpose-btn { font-size: 15px; min-height: 72px; }
    .purpose-btn .p-icon { font-size: 26px; }
  }

  @media (min-width: 560px) {
    body {
      max-width: 560px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .nav {
      left: 50%;
      right: auto;
      width: 560px;
      transform: translateX(-50%);
    }
  }
</style>
</head>

<body>
<div class="header">
  <div class="header-left">
    <img src="./assets/icon-192.png" alt="" class="app-logo" onerror="this.style.display='none'">
    <div class="header-title">차량일지</div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="vehicle-strip">
  스타리아 차량 <span>체크인 기록</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('checkin')">체크인</div>
  <div class="tab" onclick="switchTab('logs')">오늘 기록</div>
</div>

<div class="screen active" id="screen-checkin">
  <div class="notice">
    차량 사용 목적과 도착 장소를 선택한 뒤 체크인하세요.
  </div>

  <div class="step-card">
    <div class="step-header">
      <div class="step-num">1</div>
      <div class="step-title">도착 장소</div>
      <div class="step-selected" id="selLocLabel" style="display:none;"></div>
    </div>

    <div class="region-tabs" id="regionTabs">
      <div class="region-tab active" onclick="switchRegion('기흥')">기흥</div>
      <div class="region-tab" onclick="switchRegion('화성1')">화성1</div>
      <div class="region-tab" onclick="switchRegion('화성2')">화성2</div>
      <div class="region-tab" onclick="switchRegion('외부')">외부</div>
    </div>

    <div class="loc-grid" id="locGrid"></div>
    <input class="memo-input" id="locMemo" placeholder="장소를 직접 입력하세요" style="display:none;" oninput="onLocMemo(this)">
  </div>

  <div class="step-card">
    <div class="step-header">
      <div class="step-num green">2</div>
      <div class="step-title">이동 목적</div>
      <div class="step-selected green" id="selPurposeLabel" style="display:none;"></div>
    </div>

    <div class="purpose-grid">
      <div class="purpose-btn" data-purpose="식자재이동" onclick="selectPurpose(this)"><span class="p-icon">🚚</span><span>식자재</span></div>
      <div class="purpose-btn" data-purpose="비품이동" onclick="selectPurpose(this)"><span class="p-icon">📦</span><span>비품</span></div>
      <div class="purpose-btn" data-purpose="주유" onclick="selectPurpose(this)"><span class="p-icon">⛽</span><span>주유</span></div>
      <div class="purpose-btn" data-purpose="세차" onclick="selectPurpose(this)"><span class="p-icon">🚿</span><span>세차</span></div>
      <div class="purpose-btn" data-purpose="구입" onclick="selectPurpose(this)"><span class="p-icon">🛒</span><span>구입</span></div>
      <div class="purpose-btn" data-purpose="기타" onclick="selectPurpose(this)"><span class="p-icon">✏️</span><span>기타</span></div>
    </div>

    <input class="memo-input" id="purposeMemo" placeholder="목적을 직접 입력하세요" style="display:none;" oninput="checkReady()">

    <div class="keep-row" onclick="toggleKeep()">
      <input type="checkbox" id="keepPurpose">
      <label for="keepPurpose">다음에도 같은 목적 유지</label>
    </div>
  </div>

  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" disabled onclick="doCheckin()">체크인 기록</button>
  </div>
</div>

<div class="screen" id="screen-logs">
  <div class="log-list" id="logList"><div class="log-empty">불러오는 중...</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="nav">
  <div class="nav-item active" id="nav-checkin" onclick="switchTab('checkin')"><span class="nav-icon">📍</span>체크인</div>
  <div class="nav-item" id="nav-logs" onclick="switchTab('logs')"><span class="nav-icon">📋</span>오늘 기록</div>
</div>

<script>
  const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwDa_MXkY2lD_JZvR5k07goWJUrXMOz2Y__KfE_AHObEYhZrlztxt78USbiem82KgOFEQ/exec';

  const SITES = {
    '기흥':  ['SR1','SR3','6L','SDR'],
    '화성1': ['DSR','유니버스','미캠','축구단','육상단'],
    '화성2': ['H1','16L','17L','V1L'],
    '외부':  ['주유소','✏️ 기타']
  };

  let state = {
    region: '기흥',
    loc: '',
    locRegion: '',
    locMemo: '',
    purpose: '',
    purposeMemo: '',
    keepPurpose: false
  };

  window.onload = () => {
    setHeaderDate();
    renderLocButtons();
    restoreKeepPurpose();
  };

  function setHeaderDate() {
    const d = new Date();
    const day = ['일','월','화','수','목','금','토'][d.getDay()];
    document.getElementById('headerDate').textContent =
      `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${day}`;
  }

  function switchRegion(region) {
    state.region = region;
    document.querySelectorAll('.region-tab').forEach(t => {
      t.classList.toggle('active', t.textContent === region);
    });
    renderLocButtons();
  }

  function renderLocButtons() {
    const grid = document.getElementById('locGrid');
    const sites = SITES[state.region] || [];

    grid.innerHTML = sites.map(name => {
      const isEtc = name.includes('기타');
      const dataLoc = isEtc ? '기타' : name;
      const dataRegion = isEtc ? '기타' : state.region;
      const selClass = (state.loc === dataLoc && state.locRegion === dataRegion) ? ' selected' : '';
      const etcClass = isEtc ? ' etc' : '';

      return `
        <div class="loc-btn${etcClass}${selClass}"
             data-loc="${escapeAttr(dataLoc)}"
             data-region="${escapeAttr(dataRegion)}"
             onclick="selectLoc(this)">
          ${escapeHtml(name)}
        </div>`;
    }).join('');
  }

  function switchTab(tab) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

    document.getElementById(`screen-${tab}`).classList.add('active');
    document.querySelector(`.tab:nth-child(${tab === 'checkin' ? 1 : 2})`).classList.add('active');
    document.getElementById(`nav-${tab}`).classList.add('active');

    if (tab === 'logs') loadLogs();
  }

  function selectLoc(el) {
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');

    state.loc = el.dataset.loc;
    state.locRegion = el.dataset.region;

    const memoEl = document.getElementById('locMemo');
    const label = document.getElementById('selLocLabel');

    if (state.loc === '기타') {
      memoEl.style.display = 'block';
      memoEl.focus();
      label.style.display = 'none';
    } else {
      memoEl.style.display = 'none';
      state.locMemo = '';
      memoEl.value = '';
      label.textContent = state.loc;
      label.style.display = 'block';
    }

    checkReady();
  }

  function onLocMemo(el) {
    state.locMemo = el.value.trim();

    const label = document.getElementById('selLocLabel');
    if (state.locMemo) {
      label.textContent = state.locMemo;
      label.style.display = 'block';
    } else {
      label.style.display = 'none';
    }

    checkReady();
  }

  function selectPurpose(el) {
    document.querySelectorAll('.purpose-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');

    state.purpose = el.dataset.purpose;

    const memoEl = document.getElementById('purposeMemo');
    const label = document.getElementById('selPurposeLabel');

    if (state.purpose === '기타') {
      memoEl.style.display = 'block';
      memoEl.focus();
      label.style.display = 'none';
    } else {
      memoEl.style.display = 'none';
      state.purposeMemo = '';
      memoEl.value = '';
      label.textContent = state.purpose;
      label.style.display = 'block';
    }

    checkReady();
  }

  function toggleKeep() {
    const cb = document.getElementById('keepPurpose');
    cb.checked = !cb.checked;
    state.keepPurpose = cb.checked;

    localStorage.setItem('keepPurpose', cb.checked ? '1' : '0');

    if (cb.checked && state.purpose) {
      localStorage.setItem('savedPurpose', state.purpose);
    }
  }

  function restoreKeepPurpose() {
    const keep = localStorage.getItem('keepPurpose') === '1';
    const saved = localStorage.getItem('savedPurpose') || '';

    if (!keep || !saved) return;

    state.keepPurpose = true;
    state.purpose = saved;

    document.getElementById('keepPurpose').checked = true;

    document.querySelectorAll('.purpose-btn').forEach(b => {
      if (b.dataset.purpose === saved) b.classList.add('selected');
    });

    const label = document.getElementById('selPurposeLabel');
    label.textContent = saved;
    label.style.display = 'block';

    checkReady();
  }

  function checkReady() {
    const locOk = state.loc && (state.loc !== '기타' || document.getElementById('locMemo').value.trim());
    const purposeOk = state.purpose && (state.purpose !== '기타' || document.getElementById('purposeMemo').value.trim());

    document.getElementById('submitBtn').disabled = !(locOk && purposeOk);
  }

  async function doCheckin() {
    const btn = document.getElementById('submitBtn');
    const purposeMemo = document.getElementById('purposeMemo').value.trim();
    const finalLoc = state.loc === '기타' ? document.getElementById('locMemo').value.trim() : state.loc;

    if (!finalLoc || !state.purpose) {
      showToast('장소와 목적을 선택하세요');
      return;
    }

    btn.disabled = true;
    btn.textContent = '저장 중...';

    const payload = {
      action: 'checkin',
      location: finalLoc,
      region: state.locRegion,
      purpose: state.purpose,
      purposeMemo: purposeMemo
    };

    try {
      const data = await callGas(payload);

      if (data && data.ok) {
        showToast('✅ ' + finalLoc + ' 체크인 완료');

        state.loc = '';
        state.locMemo = '';
        document.getElementById('locMemo').style.display = 'none';
        document.getElementById('locMemo').value = '';
        document.getElementById('selLocLabel').style.display = 'none';
        renderLocButtons();

        if (state.keepPurpose) {
          localStorage.setItem('savedPurpose', state.purpose);
        } else {
          document.querySelectorAll('.purpose-btn').forEach(b => b.classList.remove('selected'));
          document.getElementById('purposeMemo').style.display = 'none';
          document.getElementById('purposeMemo').value = '';
          document.getElementById('selPurposeLabel').style.display = 'none';
          state.purpose = '';
        }

        btn.textContent = '체크인 기록';
        checkReady();
      } else {
        showToast('❌ 저장 실패: ' + (data ? data.message : '알 수 없는 오류'));
        btn.disabled = false;
        btn.textContent = '체크인 기록';
      }
    } catch (err) {
      showToast('❌ 저장 오류: ' + (err.message || err));
      btn.disabled = false;
      btn.textContent = '체크인 기록';
    }
  }

  async function loadLogs() {
    const listEl = document.getElementById('logList');
    listEl.innerHTML = '<div class="log-empty">불러오는 중...</div>';

    try {
      const data = await callGas({ action: 'getLogs' });

      if (!data || !data.ok || !data.logs || !data.logs.length) {
        listEl.innerHTML = '<div class="log-empty">오늘 기록이 없습니다</div>';
        return;
      }

      listEl.innerHTML = data.logs.map(log => {
        const time = formatTime(log.checkin_at);
        const from = log.prev_location || '출발';
        const purpose = log.purpose === '기타' ? (log.purpose_memo || '기타') : log.purpose;
        const badgeCls = log.purpose === '식자재이동' || log.purpose === '비품이동'
          ? 'food'
          : log.purpose === '기타'
            ? 'other'
            : '';

        const prevTime = log.prev_at ? formatTime(log.prev_at) : '';
        const timeStr = prevTime ? prevTime + ' → ' + time : time + ' 도착';

        return `
          <div class="log-item">
            <div>
              <div class="log-route">${escapeHtml(from)} → ${escapeHtml(log.location || '')}</div>
              <div class="log-time">${escapeHtml(timeStr)}</div>
            </div>
            <div class="log-badge ${badgeCls}">${escapeHtml(purpose)}</div>
          </div>`;
      }).join('');
    } catch (err) {
      listEl.innerHTML = '<div class="log-empty">불러오기 실패</div>';
      showToast('기록 조회 실패');
    }
  }

  async function callGas(payload) {
    return jsonpRequest(payload);
  }

  function jsonpRequest(payload) {
    return new Promise((resolve, reject) => {
      const callbackName = '__vehicleLogCb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();

      Object.keys(payload || {}).forEach(key => {
        const value = payload[key];
        if (value !== undefined && value !== null) {
          params.append(key, value);
        }
      });

      params.append('callback', callbackName);

      const script = document.createElement('script');
      const timer = setTimeout(() => {
        cleanup();
        reject(new Error('저장 응답 지연'));
      }, 15000);

      function cleanup() {
        clearTimeout(timer);
        try { delete window[callbackName]; } catch (err) { window[callbackName] = undefined; }
        if (script && script.parentNode) script.parentNode.removeChild(script);
      }

      window[callbackName] = function(data) {
        cleanup();

        if (data && data.ok) {
          resolve(data);
        } else {
          reject(new Error(data && data.message ? data.message : '처리 실패'));
        }
      };

      script.onerror = function() {
        cleanup();
        reject(new Error('GAS 연결 실패'));
      };

      script.src = GAS_ENDPOINT + '?' + params.toString();
      document.body.appendChild(script);
    });
  }

  function formatTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');

    setTimeout(() => {
      el.classList.remove('show');
    }, 2500);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }
</script>
</body>
